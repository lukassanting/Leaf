# Leaf: backend (SQLite + file storage) + frontend.
# From repo root: docker compose up --build

services:
  api:
    container_name: leaf-api
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend/app:/app/app
      - leaf_data:/data          # SQLite index + .md files live here
    environment:
      ENVIRONMENT: development
      DATA_DIR: /data
      ALLOWED_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    command: ["/app/.venv/bin/uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    container_name: leaf-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy
    command: ["npm", "run", "dev"]

volumes:
  leaf_data:          # persistent SQLite + Markdown files
