# Leaf: backend (SQLite + file storage) + frontend.
# From repo root: docker compose up --build
#
# No bind mounts — Docker Desktop on Windows uses 9P for bind mounts, which hits
# ENOMEM on scandir. Code changes require `make up` to rebuild.
# For hot reload during development, run `make api` + `make frontend` locally instead.

services:
  api:
    container_name: leaf-api
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - leaf_data:/data          # SQLite index + .md files live here
    environment:
      ENVIRONMENT: development
      DATA_DIR: /data
      ALLOWED_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
    # Bind to IPv4 loopback only — on Windows, `localhost` → ::1 often hits a broken
    # Docker IPv6 publish; 127.0.0.1 works. Narrow bind is fine for local dev.
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    container_name: leaf-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      api:
        condition: service_healthy
    # Pre-built image — no bind mount, no file watcher, no ENOMEM.
    # For hot reload during development, run `make frontend` locally instead.

volumes:
  leaf_data:          # persistent SQLite + Markdown files
